<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Shopping Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f8fb;
  --card: #ffffff;
  --muted: #6b7280;
  --primary: #7c3aed;
  --shadow: 0 6px 18px rgba(15,23,42,0.08);
  --radius: 12px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background:var(--bg);
  color:#0f172a;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding:24px;
}
.container{
  max-width:1200px;
  margin:0 auto;
  display:grid;
  grid-template-columns: 1fr 360px;
  gap:20px;
  align-items:start;
}
/* Responsive */
@media (max-width:1000px){
  .container {grid-template-columns:1fr;}
  .assistant-panel{position:fixed;right:16px;bottom:16px;width:320px;height:420px;z-index:40;box-shadow:var(--shadow);border-radius:12px;}
}
/* Header */
.header{
  grid-column:1/-1;
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:space-between;
}
.brand{display:flex;gap:12px;align-items:center}
.logo{
  width:48px;height:48px;border-radius:10px;
  background:linear-gradient(135deg,#06b6d4,#7c3aed);
  color:white;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:var(--shadow);
}
.header-actions{display:flex;gap:12px;align-items:center}
.search{
  background:var(--card);padding:8px 12px;border-radius:999px;box-shadow:var(--shadow);display:flex;gap:8px;align-items:center;width:420px;
}
.search input{border:none;outline:none;background:transparent;font-size:14px;width:100%}
.icon{opacity:0.9}
/* Main */
.panel{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.filter{background:#f3f4f6;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:13px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,1),rgba(248,250,252,1));
  border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(11,22,39,0.06);display:flex;flex-direction:column;gap:8px;
}
.card .media{height:140px;border-radius:10px;background:linear-gradient(135deg,#eef2ff,#ecfeff);display:flex;align-items:center;justify-content:center;font-size:40px}
.card h4{margin:0;font-size:16px}
.card p{margin:0;font-size:13px;color:var(--muted)}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.btn{
  background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white;padding:8px 12px;border-radius:10px;border:none;cursor:pointer;font-weight:600;
  box-shadow:0 6px 14px rgba(124,58,237,0.18)
}
.btn.ghost{background:transparent;color:var(--primary);border:1px solid #eef2ff;box-shadow:none}
/* Assistant Panel */
.assistant-panel{
  position:relative;
}
.chat{
  display:flex;flex-direction:column;height:640px;
  background:linear-gradient(180deg,#ffffff,#fbfdff);border-radius:12px;padding:12px;box-shadow:var(--shadow);
}
.chat .messages{flex:1;overflow:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:10px 12px;border-radius:12px;font-size:14px}
.msg.user{align-self:flex-end;background:#eef2ff;color:#072;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#f3f4f6;color:#0f172a}
.chat .composer{display:flex;gap:8px;padding-top:8px}
.input{flex:1;padding:10px;border-radius:10px;border:1px solid #e6edf3;background:white}
.badge{background:#fde68a;color:#92400e;padding:6px 8px;border-radius:999px;font-weight:700}
.cart{display:flex;gap:8px;align-items:center}
/* small helpers */
.kv{font-size:13px;color:var(--muted)}
.empty{color:var(--muted);text-align:center;padding:28px;border-radius:10px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">
      <div class="logo">AI</div>
      <div>
        <div style="font-weight:700">AI Shopping Assistant</div>
        <div class="kv">Smart product suggestions & fast checkout</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="search">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35" stroke="#374151" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="search" placeholder="Search products, e.g. headphones" />
      </div>
      <div class="cart">
        <div class="badge" id="cart-count">0</div>
        <button class="btn ghost" id="clear-cart">Clear</button>
      </div>
    </div>
  </div>

  <main>
    <section class="panel">
      <div class="filters">
        <div class="filter">All Categories</div>
        <div class="filter">Electronics</div>
        <div class="filter">Clothing</div>
        <div class="filter">Home</div>
      </div>
      <div class="products" id="products"></div>
      <div id="no-results" class="empty" style="display:none">No products found</div>
    </section>
  </main>

  <aside class="assistant-panel">
    <div class="panel" style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-weight:700">Assistant</div>
        <div class="kv">Ask about products, price, or styles — or use the Flowise bubble</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" id="assistant-open">Chat</button>
      </div>
    </div>

    <div class="chat" id="assistant" style="display:block">
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input id="user-input" class="input" placeholder="Ask me for recommendations or type a product name" />
        <button class="btn" id="send">Send</button>
      </div>
    </div>
  </aside>
</div>

<script>
const products = [
  {id:1,name:"Wireless Headphones",price:99.99,category:"Electronics",desc:"Comfortable, noise-cancelling.",emoji:"🎧"},
  {id:2,name:"Smartwatch Pro",price:149.99,category:"Electronics",desc:"Health tracking & notifications.",emoji:"⌚️"},
  {id:3,name:"Classic Sneakers",price:79.99,category:"Clothing",desc:"Lightweight and durable.",emoji:"👟"},
  {id:4,name:"Coffee Maker",price:59.99,category:"Home",desc:"Brew rich coffee at home.",emoji:"☕️"},
  {id:5,name:"Bluetooth Speaker",price:49.99,category:"Electronics",desc:"Portable with deep bass.",emoji:"🔊"},
  {id:6,name:"Denim Jacket",price:99.00,category:"Clothing",desc:"Stylish mid-weight jacket.",emoji:"🧥"},
  {id:7,name:"Air Purifier",price:129.00,category:"Home",desc:"Removes dust and odors.",emoji:"🌬️"},
  {id:8,name:"Fitness Band",price:39.00,category:"Electronics",desc:"Steps, sleep, and heart-rate.",emoji:"📈"}
];

const productsEl = document.getElementById('products');
const messagesEl = document.getElementById('messages');
const cartCount = document.getElementById('cart-count');
const searchInput = document.getElementById('search');
const noResults = document.getElementById('no-results');
let cart = [];

function renderProducts(list){
  productsEl.innerHTML = '';
  if(list.length===0){ noResults.style.display='block'; return }
  noResults.style.display='none';
  list.forEach(p=>{
    const el = document.createElement('div');
    el.className='card';
    el.innerHTML = `
      <div class="media">${p.emoji}</div>
      <h4>${p.name}</h4>
      <p class="kv">${p.desc}</p>
      <div class="price-row">
        <div style="font-weight:700">$${p.price.toFixed(2)}</div>
        <div>
          <button class="btn add" data-id="${p.id}">Add</button>
        </div>
      </div>
    `;
    productsEl.appendChild(el);
  });
  document.querySelectorAll('.add').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const id = +e.currentTarget.dataset.id;
      addToCart(id);
    });
  });
}

function addToCart(id){
  cart.push(id);
  cartCount.textContent = cart.length;
  showBotMessage('Added to cart ✓');
}

function clearCart(){
  cart = [];
  cartCount.textContent = 0;
}
document.getElementById('clear-cart').addEventListener('click',clearCart);

searchInput.addEventListener('input',e=>{
  const q = e.target.value.toLowerCase().trim();
  const filtered = products.filter(p=>p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
  renderProducts(filtered);
});

document.getElementById('send').addEventListener('click',sendMessage);
document.getElementById('assistant-open').addEventListener('click',()=>{
  // The Flowise embed creates its own bubble; this button focuses the local assistant panel.
  document.getElementById('assistant').style.display = 'block';
  document.getElementById('user-input').focus();
});

function appendMessage(text, who='bot'){
  const m = document.createElement('div');
  m.className = 'msg ' + (who==='user'?'user':'bot');
  m.textContent = text;
  messagesEl.appendChild(m);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showBotMessage(text){
  appendMessage(text,'bot');
}

function sendMessage(){
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if(!text) return;
  appendMessage(text,'user');
  input.value='';
  // fake typing indicator
  appendMessage('Thinking...','bot');
  setTimeout(()=>{
    const last = messagesEl.querySelectorAll('.msg.bot');
    last[last.length-1].textContent = "Here are a few suggestions:";
    const suggestions = products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()) || p.desc.toLowerCase().includes(text.toLowerCase())).slice(0,3);
    if(suggestions.length===0){
      showBotMessage("I couldn't find exact matches — try 'headphones' or 'coffee'.");
    } else {
      suggestions.forEach(s=>{
        showBotMessage(s.name + " — $" + s.price.toFixed(2));
      });
      showBotMessage("Click Add on any product to put it in your cart.");
    }
  },700);
}

function seedWelcome(){
  showBotMessage("Hi — I'm your shopping assistant. Ask me for recommendations.");
}

seedWelcome();
renderProducts(products);
</script>

<!-- Flowise embed: keeps your existing chatflow. The floating bubble will appear automatically. -->
<script type="module">
  import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";
  try{
    Chatbot.init({
      chatflowid: "b3174174-f43d-4c14-9139-00a7861e9df9",
      apiHost: "https://cloud.flowiseai.com",
    });
  }catch(e){
    console.warn('Flowise embed failed to load', e);
  }
</script>
</body>
</html>
